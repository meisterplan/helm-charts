kind: Service
apiVersion: v1
metadata:
  name: {{ .Release.Name }}
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: service
      port: 80
      targetPort: 8080
    {{- range $port := .Values.service.internalPorts }}
    - name: {{ $port.name }}
      port: {{ $port.port }}
      protocol: {{ $port.protocol }}
      targetPort: {{ $port.targetPort }}
    {{- end }}
  selector:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Values.image.tag }}

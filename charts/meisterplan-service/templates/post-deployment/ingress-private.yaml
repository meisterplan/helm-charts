apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-private
  namespace: "{{ .Release.Namespace }}"
spec:
  ingressClassName: nginx-private
  rules:
    - host: {{ .Release.Name }}.internal.{{ required "ingress.clusterDomain must be set!" .Values.ingress.clusterDomain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}
                port:
                  number: 80

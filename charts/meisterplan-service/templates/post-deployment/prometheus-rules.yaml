apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  namespace: "{{ .Release.Namespace }}"
  name: "{{ .Release.Name }}"
spec:
  groups:
{{- if .Values.prometheus.alertingRules }}
    - name: "{{ .Release.Name }}"
      rules:
        {{- range .Values.prometheus.alertingRules }}
        - alert: "{{ $.Release.Name }}_{{ .name }}"
          expr: {{ .expr | quote }}
          {{- if .for }}
          for: {{ .for | quote }}
          {{- end }}
          labels:
            service: {{ $.Release.Name | quote }}
            namespace: {{ $.Release.Namespace | quote }}
            {{- if .severity }}
            severity: {{ .severity | quote }}
            {{- end }}
            {{- range $key, $value := .extraLabels }}
            {{ $key }}: {{ $value | quote }}
            {{- end }}
          annotations:
            description: {{ required "Description must be set!" .description | quote }}
            playbook_url: {{ required "Playbook URL must be set!" .playbook_url | quote }}
            {{- range $key, $value := .extraAnnotations }}
            {{ $key }}: {{ $value | quote }}
            {{- end }}
        {{- end }}
{{- end }}

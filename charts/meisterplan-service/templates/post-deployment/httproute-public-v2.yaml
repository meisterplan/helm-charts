{{- if false }}
{{/* Enable me with v2.0.0 */}}
{{- range $routeName, $route := .Values.route }}
{{- if $route.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-{{ $routeName }}
  namespace: "{{ .Release.Namespace }}"
spec:
  parentRefs:
    - name: mp-public
      namespace: istio-system
      sectionName: https-public
  hostnames:
    {{- range $host := $route.hostnames }}
    - {{ include "validate-hostname" (replace "$clusterDomain" .Values.route.clusterDomain $host) }}
    {{- end }}
  rules:
  - matches:
    {{- if $route.paths.allowAll }}
    - path:
        type: PathPrefix
        value: /
    {{- else }}
    {{- range $prefix := $route.paths.prefixes }}
      {{- if eq $prefix "/" }}
      {{ fail "Prefixes may not contain /, please set allowAll: true explicitly!" }}
      {{- end }}
    - path:
        type: PathPrefix
        value: {{ $prefix }}
    {{- end }}
    {{- range $exact := $route.paths.exact }}
    - path:
        type: Exact
        value: {{ $exact }}
    {{- end }}
    {{- end }}
    backendRefs:
      - name: {{ .Release.Name }}
        port: 80
    filters:
      # We enforce the CSP header here explicitly so that backends can't overwrite it unintentionally. This is necessary because we have a "soft overwrite" in
      #  the gateway config, so other services like Kibana can set their stricter version.
      - type: ResponseHeaderModifier
        responseHeaderModifier:
          set:
            # See https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy
            # frame-ancestors are allowed to embed iframes from microfrontends.<clusterDomain> into the application on <clusterDomain>
            - name: "Content-Security-Policy"
              value: "frame-ancestors 'self' {{ .Values.route.clusterDomain }}"
    {{- if $route.timeouts }}
    {{ toYaml $route.timeouts }}
    {{- end }}
{{- end }}
{{- end }}
{{- end }}

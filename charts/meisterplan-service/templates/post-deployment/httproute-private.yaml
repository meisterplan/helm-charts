apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-private
  namespace: "{{ .Release.Namespace }}"
spec:
  parentRefs:
    - name: mp-private
      namespace: istio-system
      sectionName: https-private
  hostnames:
    - {{ .Release.Name }}.internal.{{ required "ingress.clusterDomain must be set!" .Values.ingress.clusterDomain }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
      - name: {{ .Release.Name }}
        port: 80

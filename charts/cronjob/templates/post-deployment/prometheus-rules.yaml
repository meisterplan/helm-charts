apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  namespace: "{{ .Release.Namespace }}"
  name: "{{ .Release.Name }}"
spec:
  groups:
    - name: "{{ .Release.Name }}"
      rules:
        - alert: KubeCronJobFailed
          expr: kube_job_failed{job_name=~"{{ .Release.Name }}-[0-9]+$", namespace="{{.Release.Namespace}}", condition="true"} > 0
          annotations:
            description: CronJob {{ "{{" }} $labels.namespace }}/{{ "{{" }} $labels.job_name }} failed to complete.
            playbook_url: {{ .Values.alertOnFailing.playbookUrl | required "Must set alertOnFailing.playbookUrl!" }}
            pint: pint disable promql/series(kube_job_failed) # Metric only appears after failing jobs
          labels:
            severity: {{ .Values.alertOnFailing.severity }}
        # this prevents the global unknown job alert to trigger
        - record: cronjob:known_cronjob
          expr: vector(1)
          labels:
            namespace: {{ .Release.Namespace | quote }}
            cronjob: {{ .Release.Name | quote }}
        {{- range $key, $value := .Values.alertingRules }}
        - alert: "{{ $.Release.Name }}_{{ $key }}"
          expr: {{ $value.expr | quote }}
          {{- if $value.for }}
          for: {{ $value.for | quote }}
          {{- end }}
          labels:
            service: {{ $.Release.Name | quote }}
            namespace: {{ $.Release.Namespace | quote }}
            {{- if .severity }}
            severity: {{ .severity | quote }}
            {{- end }}
            {{- range $key, $value := .extraLabels }}
            {{ $key }}: {{ $value | quote }}
            {{- end }}
          annotations:
            description: {{ required "Description must be set!" .description | quote }}
            playbook_url: {{ required "Playbook URL must be set!" .playbook_url | quote }}
            {{- range $key, $value := .extraAnnotations }}
            {{ $key }}: {{ $value | quote }}
            {{- end }}
        {{- end }}

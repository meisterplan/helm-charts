---
# Source: meisterplan-service/templates/pre-deployment/secret.yaml
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  namespace: team-supercool
  name: myservice-external-secret
spec:
  refreshInterval: "5m"
  secretStoreRef:
    name: secret-store
    kind: SecretStore
  data:
    
    - secretKey: "SERVICE_OAUTH2_PUBLIC_KEY"
      remoteRef:
        key: "/staging/authenticorn/public-key"
    - secretKey: "DATASOURCE_URL"
      remoteRef:
        key: "/staging/rds/myservice/jdbc-url"
    - secretKey: "DATASOURCE_USERNAME"
      remoteRef:
        key: "/staging/rds/myservice/rls-username"
    - secretKey: "DATASOURCE_PASSWORD"
      remoteRef:
        key: "/staging/rds/myservice/rls-password"
    - secretKey: "DATASOURCE_PRIVILEGED_CONNECTION_USER"
      remoteRef:
        key: "/staging/rds/myservice/username"
    - secretKey: "DATASOURCE_PRIVILEGED_CONNECTION_PASSWORD"
      remoteRef:
        key: "/staging/rds/myservice/password"
    - secretKey: "RABBITMQ_HOST"
      remoteRef:
        key: "/staging/rabbitmq/hostname"
    - secretKey: "RABBITMQ_SSL_ENABLED"
      remoteRef:
        key: "/staging/rabbitmq/ssl"
    - secretKey: "RABBITMQ_USERNAME"
      remoteRef:
        key: "/staging/rabbitmq/username"
    - secretKey: "RABBITMQ_PASSWORD"
      remoteRef:
        key: "/staging/rabbitmq/password"

---
# Source: meisterplan-service/templates/post-deployment/httproute-public.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: myservice-public
  namespace: "team-supercool"
spec:
  parentRefs:
    - name: mp-public
      namespace: istio-system
      sectionName: https-public
  hostnames:
    - mycompany.tld
    - myservice.othercompany.tld
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/v1/public
    - path:
        type: Exact
        value: /welcome
    - path:
        type: Exact
        value: /index.html
    backendRefs:
      - name: myservice
        port: 80

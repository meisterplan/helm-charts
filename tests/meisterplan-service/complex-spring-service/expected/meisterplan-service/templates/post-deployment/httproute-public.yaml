---
# Source: meisterplan-service/templates/post-deployment/httproute-public.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: myservice-public
  namespace: "team-supercool"
spec:
  parentRefs:
    - name: mp-public
      namespace: istio-system
      sectionName: https-public
  hostnames:
    - mycompany.tld
    - myservice.othercompany.tld
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/v1/public
    - path:
        type: Exact
        value: /welcome
    - path:
        type: Exact
        value: /index.html
    backendRefs:
      - name: myservice
        port: 80
    filters:
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        remove:
          - "Server"
          - "X-Application-Context"
          - "X-Powered-By"
          - "Strict-Transport-Security"
          - "Content-Security-Policy"
          - "X-Content-Type-Options"
          - "Referrer-Policy"
          - "X-Robots-Tag"
        add:
          # See https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy
          # frame-ancestors are allowed to embed iframes from microfrontends.<clusterDomain> into the application on <clusterDomain>
          - name: "Content-Security-Policy"
            value: "frame-ancestors 'self' mycompany.tld"
          # See https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Content-Type-Options
          - name: "X-Content-Type-Options"
            value: "nosniff"
          # See https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Referrer-Policy
          - name: "Referrer-Policy"
            value: "strict-origin-when-cross-origin"
          # See https://developers.google.com/search/docs/crawling-indexing/robots-meta-tag?hl=de#directives
          - name: "X-Robots-Tag"
            value: "noindex, nofollow"
          # See https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
          - name: "Strict-Transport-Security"
            value: "max-age=31536000; includeSubDomains; preload"

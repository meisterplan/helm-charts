---
# Source: meisterplan-service/templates/post-deployment/ingress-public.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myservice-public
  namespace: "team-supercool"
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "false"
spec:
  ingressClassName: nginx-public
  rules:
    - host: my-node-service.mycompany.tld
      http:
        paths:
          - path: /assets
            pathType: Prefix
            backend:
              service:
                name: myservice
                port:
                  number: 80
          
          - path: /index.html
            pathType: ImplementationSpecific
            backend:
              service:
                name: myservice
                port:
                  number: 80

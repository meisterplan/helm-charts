---
# Source: meisterplan-service/templates/post-deployment/httproute-private.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: myservice-private
  namespace: "team-supercool"
spec:
  parentRefs:
    - name: mp-private
      namespace: istio-system
      sectionName: https-private
  hostnames:
    - myservice.internal.mycompany.tld
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: myservice
          port: 80

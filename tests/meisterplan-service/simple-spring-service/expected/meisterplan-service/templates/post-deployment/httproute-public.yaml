---
# Source: meisterplan-service/templates/post-deployment/httproute-public.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: myservice-public
  namespace: "team-supercool"
spec:
  parentRefs:
    - name: mp-public
      namespace: istio-system
      sectionName: https-public
  hostnames:
    - myservice.mycompany.tld
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
      - name: myservice
        port: 80
    filters:
      # We enforce the CSP header here explicitly so that backends can't overwrite it unintentionally. This is necessary because we have a "soft overwrite" in
      #  the gateway config, so other services like Kibana can set their stricter version.
      - type: ResponseHeaderModifier
        responseHeaderModifier:
          set:
            # See https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy
            # frame-ancestors are allowed to embed iframes from microfrontends.<clusterDomain> into the application on <clusterDomain>
            - name: "Content-Security-Policy"
              value: "frame-ancestors 'self' mycompany.tld"
      # add header to control our error-pages filter
      - type: ResponseHeaderModifier
        responseHeaderModifier:
          set:
            - name: "x-custom-error-handling"
              value: 502

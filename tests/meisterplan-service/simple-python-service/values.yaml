image:
  repository: "123456789012.dkr.ecr.eu-central-1.amazonaws.com/my-python-service"
  tag: "git-zyx"

envName: "staging"

platform:
  python:
    enabled: true

routing:
  clusterDomain: "mycompany.tld"
route:
  public:
    hostnames:
      - "my-python-service.$clusterDomain"

podConfiguration:
  resources:
    memory: 256Mi
    cpu:
      guarantee: 100m

prometheus:
  scraping:
    enabled: false
